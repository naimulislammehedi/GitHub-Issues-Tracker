<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- LOAD TAILWIND CSS FOR STYLING, FONT AWESOME FOR ICONS, AND GOOGLE FONTS FOR INTER FONT -->
    <!-- TAILWIND -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FONTAWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="./CSS/style.css">
</head>

<body>
    <!-- LOGIN PAGE -->
    <div id="loginPage" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-[480px] rounded-2xl border border-slate-100 p-12 login-card text-center">
            <div class="flex justify-center mb-6">
                <i class="fa-brands fa-github text-7xl text-[#1B1F23]"></i>
            </div>
            <h1 class="text-[26px] font-bold text-slate-900 mb-1">GitHub Issues Tracker</h1>
            <p class="text-slate-400 text-sm mb-10">Sign in to manage your issues</p>

            <div class="text-left space-y-5">
                <div>
                    <label class="block text-[13px] font-semibold text-slate-700 mb-2">Username</label>
                    <input type="text" id="userInput" placeholder="Enter Username"
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all">
                    <p class="text-[11px] text-[#4A00FF] mt-1.5 font-medium">Default: admin</p>
                </div>
                <div>
                    <label class="block text-[13px] font-semibold text-slate-700 mb-2">Password</label>
                    <input type="password" id="passInput" placeholder="Enter Password"
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all">
                    <p class="text-[11px] text-[#4A00FF] mt-1.5 font-medium">Default: admin123</p>
                </div>

                <button onclick="handleLogin()"
                    class="w-full bg-[#4F46E5] hover:bg-[#4338CA] text-white font-bold py-3.5 rounded-lg transition-colors mt-4">
                    Sign In
                </button>
            </div>

            <div class="relative my-10">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-slate-100"></div>
                </div>
                <div class="relative flex justify-center text-[12px]"><span
                        class="px-4 bg-white text-slate-400 font-bold">OR</span></div>
            </div>

            <div class="bg-slate-50 rounded-xl p-6 border border-slate-100">
                <p class="text-[12px] text-slate-400 mb-3 font-medium">Demo Credentials:</p>
                <div class="space-y-1">
                    <p class="text-sm text-slate-700"><span class="font-bold">Username:</span> admin</p>
                    <p class="text-sm text-slate-700"><span class="font-bold">Password:</span> admin123</p>
                </div>
            </div>
        </div>
    </div>

    <!-- DASHBOARD PAGE -->
     <div id="dashboardPage" class="hidden min-h-screen">
        <!-- NAVBAR -->
         <header class="bg-[#F8FAFC]/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-200">
            <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <i class="fa-brands fa-github text-2xl"></i>
                    <h1 class="font-bold text-lg tracking-tight">GitHub Issues Tracker</h1>
                </div>
                <div class="flex items-center gap-3">
                    <div class="relative">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                        <input type="text" id="searchInput" onkeyup="if(event.key === 'Enter') handleSearch()" placeholder="Search issues..." class="pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-md text-sm w-64 focus:outline-none focus:border-indigo-500 transition-colors">
                    </div>
                    <button onclick="handleSearch()" class="bg-[#4F46E5] text-white px-4 py-2 rounded-md text-sm font-semibold hover:bg-[#4338CA] transition-colors">
                        Search
                    </button>
                </div>
            </div>
        </header>

        
     </div>


    <!-- JAVASCRIPT -->
    <script src="./script.js"></script>
</body>

</html>
